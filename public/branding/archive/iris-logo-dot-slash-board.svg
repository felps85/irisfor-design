<svg width="1220" height="900" viewBox="0 0 1220 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="78" y1="60" x2="1136" y2="832" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF3FB"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F9FD"/>
    </linearGradient>
    <linearGradient id="irisBlue" x1="108" y1="72" x2="376" y2="428" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EC4FF"/>
      <stop offset="0.44" stop-color="#2E86FF"/>
      <stop offset="1" stop-color="#132A67"/>
    </linearGradient>
    <g id="mono-mark">
      <circle cx="146" cy="140" r="38" fill="#0F172A"/>
      <circle cx="366" cy="140" r="38" fill="#0F172A"/>
      <rect x="95" y="318" width="108" height="316" rx="54" transform="rotate(-38 95 318)" fill="#0F172A"/>
      <rect x="255" y="330" width="92" height="212" rx="46" transform="rotate(-38 255 330)" fill="#0F172A"/>
    </g>
    <g id="blue-mark">
      <circle cx="146" cy="140" r="38" fill="url(#irisBlue)"/>
      <circle cx="366" cy="140" r="38" fill="url(#irisBlue)"/>
      <rect x="95" y="318" width="108" height="316" rx="54" transform="rotate(-38 95 318)" fill="url(#irisBlue)"/>
      <rect x="255" y="330" width="92" height="212" rx="46" transform="rotate(-38 255 330)" fill="url(#irisBlue)"/>
    </g>
  </defs>

  <rect width="1220" height="900" rx="40" fill="url(#bg)"/>
  <text x="72" y="92" fill="#0F172A" font-family="Syne, Arial, sans-serif" font-size="48" font-weight="700">Iris simple mark direction</text>
  <text x="72" y="132" fill="#55657F" font-family="Manrope, Arial, sans-serif" font-size="24">Reduced to four primitives so it stays recognizable and strong at small sizes.</text>

  <rect x="56" y="182" width="520" height="458" rx="30" fill="url(#card)" stroke="#D9E4F2"/>
  <rect x="644" y="182" width="520" height="458" rx="30" fill="url(#card)" stroke="#D9E4F2"/>

  <g transform="translate(120 222) scale(0.72)">
    <use href="#mono-mark"/>
  </g>
  <g transform="translate(708 222) scale(0.72)">
    <use href="#blue-mark"/>
  </g>

  <text x="88" y="556" fill="#111827" font-family="Syne, Arial, sans-serif" font-size="30" font-weight="700">Mono</text>
  <text x="88" y="592" fill="#596984" font-family="Manrope, Arial, sans-serif" font-size="19">Best for pure recognition, favicon, and app icon discipline.</text>

  <text x="676" y="556" fill="#111827" font-family="Syne, Arial, sans-serif" font-size="30" font-weight="700">Blue</text>
  <text x="676" y="592" fill="#596984" font-family="Manrope, Arial, sans-serif" font-size="19">Same geometry, just enough Iris colour to feel branded without adding noise.</text>

  <text x="72" y="728" fill="#0F172A" font-family="IBM Plex Mono, monospace" font-size="22">small-size check</text>
  <text x="72" y="768" fill="#5C6B85" font-family="IBM Plex Mono, monospace" font-size="16">48</text>
  <text x="72" y="822" fill="#5C6B85" font-family="IBM Plex Mono, monospace" font-size="16">32</text>
  <text x="72" y="864" fill="#5C6B85" font-family="IBM Plex Mono, monospace" font-size="16">20</text>

  <g transform="translate(126 744) scale(0.09375)"><use href="#mono-mark"/></g>
  <g transform="translate(174 756) scale(0.0625)"><use href="#mono-mark"/></g>
  <g transform="translate(214 766) scale(0.0390625)"><use href="#mono-mark"/></g>

  <g transform="translate(358 744) scale(0.09375)"><use href="#blue-mark"/></g>
  <g transform="translate(406 756) scale(0.0625)"><use href="#blue-mark"/></g>
  <g transform="translate(446 766) scale(0.0390625)"><use href="#blue-mark"/></g>

  <rect x="644" y="698" width="520" height="138" rx="26" fill="#0F172A"/>
  <g transform="translate(706 718) scale(0.28)">
    <use href="#blue-mark"/>
  </g>
  <text x="890" y="756" fill="#F8FBFF" font-family="Syne, Arial, sans-serif" font-size="28" font-weight="700">Dark-surface check</text>
  <text x="890" y="794" fill="#CAD7EC" font-family="Manrope, Arial, sans-serif" font-size="18">The blue version stays crisp enough on dark UI, but the mono shape is still the strongest core asset.</text>
</svg>
