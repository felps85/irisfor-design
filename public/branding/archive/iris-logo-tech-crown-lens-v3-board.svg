  <rect width="1280" height="980" rx="40" fill="url(#bg)"/>
  <text x="72" y="96" fill="#0F172A" font-family="Syne, Arial, sans-serif" font-size="48" font-weight="700">Gradient crown + impossible lens round</text>
  <text x="72" y="138" fill="#55657F" font-family="Manrope, Arial, sans-serif" font-size="24">Crown pushed back toward gradient-led simplicity. Lens rebuilt around one impossible-shape idea with the eye inside.</text>

