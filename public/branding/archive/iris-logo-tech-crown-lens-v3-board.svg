  <rect x="56" y="856" width="1168" height="88" rx="24" fill="#FFFFFF" stroke="#D9E4F2"/>
  <text x="88" y="912" fill="#54647E" font-family="Manrope, Arial, sans-serif" font-size="22">My read: this is closer to your note. The crown is calmer and cleaner. The lens is more concept-led now, though it may still want one more pass to make the impossible read even faster.</text>
