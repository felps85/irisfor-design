<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F4EE"/>
  <rect x="88" y="88" width="1424" height="724" rx="40" fill="#FFFFFF"/>
  <rect x="88.5" y="88.5" width="1423" height="723" rx="39.5" stroke="#0F172A" stroke-opacity="0.08"/>
  <text x="136" y="174" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Publish stays explicit</text>
  <text x="136" y="216" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="26">Iris drafts the review first. You decide what gets posted back into Figma.</text>
  <rect x="136" y="270" width="800" height="454" rx="32" fill="#FBFAF7"/>
  <text x="184" y="336" fill="#64748B" font-family="IBM Plex Mono, Arial, sans-serif" font-size="18" letter-spacing="0.12em">COMMENT DRAFTS</text>
  <rect x="184" y="376" width="704" height="116" rx="24" fill="#FFFFFF"/>
  <text x="216" y="432" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Move the proof module below the summary.</text>
  <text x="216" y="468" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="22">The promise should land before the host surfaces and metrics.</text>
  <rect x="184" y="520" width="704" height="116" rx="24" fill="#FFFFFF"/>
  <text x="216" y="576" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Tighten the CTA grouping in the hero.</text>
  <text x="216" y="612" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="22">This keeps the call to action feeling deliberate instead of scattered.</text>
  <rect x="996" y="270" width="380" height="454" rx="32" fill="#F8FAFC"/>
  <text x="1036" y="336" fill="#64748B" font-family="IBM Plex Mono, Arial, sans-serif" font-size="18" letter-spacing="0.12em">PUBLISH PANEL</text>
  <text x="1036" y="400" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">2 ready</text>
  <text x="1036" y="438" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Review drafts are prepared, but nothing has been posted yet.</text>
  <rect x="1036" y="490" width="300" height="64" rx="32" fill="#0F172A"/>
  <text x="1103" y="531" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Publish comments</text>
  <rect x="1036" y="572" width="300" height="64" rx="32" fill="#FFFFFF"/>
  <rect x="1036.5" y="572.5" width="299" height="63" rx="31.5" stroke="#0F172A" stroke-opacity="0.1"/>
  <text x="1120" y="613" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Keep as draft</text>
  <text x="1036" y="684" fill="#64748B" font-family="IBM Plex Mono, Arial, sans-serif" font-size="18" letter-spacing="0.12em">USER CONTROL</text>
  <text x="1036" y="724" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="22">Publishing is always a separate confirmation step.</text>
</svg>
